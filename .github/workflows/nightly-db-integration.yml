name: Nightly DB Integration

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  db-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kalshi_weather_test
          POSTGRES_USER: kalshi
          POSTGRES_PASSWORD: k4lsh1_w34th3r_b0t_2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kalshi -d kalshi_weather_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: kalshi_weather_test
      DB_USER: kalshi
      DB_PASSWORD: k4lsh1_w34th3r_b0t_2026
      ENVIRONMENT: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r services/data-ingestion/requirements.txt
          pip install -r services/prediction-engine/requirements.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket
          import time

          for _ in range(60):
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("PostgreSQL did not become ready in time")
          PY

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run DB integration tests
        run: |
          pytest services/data-ingestion/tests/test_integration_db.py -m integration -q
          pytest services/prediction-engine/tests/test_integration_db.py -m integration -q
