services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-kalshi_weather}
      POSTGRES_USER: ${DB_USER:-kalshi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kalshi} -d ${DB_NAME:-kalshi_weather}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Port exposed for local dev only. Production docker-compose.prod.yml will NOT expose this.
    ports:
      - "5432:5432"

  data-ingestion:
    build:
      context: .
      dockerfile: services/data-ingestion/Dockerfile
    env_file: .env
    environment:
      - VISUAL_CROSSING_API_KEY
      - PIRATE_WEATHER_API_KEY
      - OPENWEATHER_API_KEY
      - NWS_USER_AGENT
    volumes:
      - ./secrets/kalshi_private.pem:/app/secrets/kalshi_private.pem:ro
      - nws_cache:/app/data
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prediction-engine:
    build:
      context: .
      dockerfile: services/prediction-engine/Dockerfile
    env_file: .env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: .env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  nws_cache:

networks:
  backend:
    driver: bridge
